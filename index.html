<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quà Sinh Nhật Bí Ẩn</title>
    <style>
      /* Import font Quicksand mềm mại, dễ thương */
      @import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap");

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at center, #1a0b2e 0%, #05010d 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Quicksand", sans-serif; /* Đã đổi font */
        color: white;
        overflow: hidden;
        user-select: none;
      }

      /* ===== GIAO DIỆN ĐĂNG NHẬP ===== */
      #login-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 20px;
        border: 2px solid rgba(255, 0, 127, 0.3);
        box-shadow: 0 0 20px rgba(255, 0, 127, 0.2);
        backdrop-filter: blur(10px);
        transition: opacity 0.5s ease;
      }

      #login-container h2 {
        margin-top: 0;
        color: #ff99cc;
        text-shadow: 0 0 10px rgba(255, 153, 204, 0.5);
      }

      input[type="password"] {
        padding: 15px 20px;
        font-size: 1.2rem;
        font-family: "Quicksand", sans-serif;
        font-weight: 700;
        border-radius: 10px;
        border: 2px solid #ff007f;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        text-align: center;
        outline: none;
        margin-bottom: 20px;
        transition: all 0.3s ease;
      }

      input[type="password"]:focus {
        box-shadow: 0 0 15px #ff007f;
      }

      #login-btn {
        padding: 12px 30px;
        font-size: 1.1rem;
        font-family: "Quicksand", sans-serif;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, #ff007f, #b30059);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      #login-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(255, 0, 127, 0.8);
      }

      #error-msg {
        color: #ff4d4d;
        margin-top: 15px;
        font-size: 0.9rem;
        height: 20px;
        font-weight: 700;
      }

      /* Hiệu ứng rung khi sai pass */
      .shake-error {
        animation: shakeLogin 0.4s ease-in-out;
      }

      @keyframes shakeLogin {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        50% { transform: translateX(10px); }
        75% { transform: translateX(-10px); }
      }

      /* ===== GIAO DIỆN GAME (Ẩn đi lúc đầu) ===== */
      #game-container {
        display: none; /* Ẩn đi chờ mở khóa */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: fadeIn 1s ease-in-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 900;
        text-align: center;
        line-height: 1.3;
        margin-bottom: 10px;
        color: #fff;
        text-shadow: 0px 4px 0px #b30059, 0px 8px 15px rgba(255, 0, 127, 0.5),
          0px 0px 30px #ff007f;
        letter-spacing: 2px;
      }

      h4 {
        color: #ffb3d9;
        font-weight: 500;
        margin-bottom: 50px;
        text-align: center;
      }

      .gift-container {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
        perspective: 1000px;
      }

      .gift-box {
        width: 140px;
        height: 140px;
        position: relative;
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
      }

      .gift-box:hover:not(.open):not(.shaking) {
        transform: translateY(-15px) rotateX(10deg) rotateY(-15deg) scale(1.05);
      }

      .box-img {
        width: 100%;
        height: 100%;
        background: linear-gradient(145deg, #ffcc00, #ff6600);
        border-radius: 20px;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        box-shadow: 10px 15px 25px rgba(0, 0, 0, 0.6),
          inset 5px 5px 15px rgba(255, 255, 255, 0.5),
          inset -5px -10px 20px rgba(0, 0, 0, 0.4);
        border: 2px solid #ffe680;
      }

      .box-img::before,
      .box-img::after {
        content: "";
        position: absolute;
        background: linear-gradient(145deg, #ff1a1a, #cc0000);
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
      }
      .box-img::before {
        width: 26px;
        height: 100%;
        left: 50%;
        transform: translateX(-50%);
      }
      .box-img::after {
        width: 100%;
        height: 26px;
        top: 50%;
        transform: translateY(-50%);
      }

      .box-img span {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 40px;
        background: gold;
        border-radius: 50%;
        z-index: 3;
        box-shadow: inset 2px 2px 5px rgba(255, 255, 255, 0.8),
          inset -2px -2px 5px rgba(0, 0, 0, 0.5);
        border: 3px solid #b34700;
      }

      .prize {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        border-radius: 20px;
        border: 3px solid #00f2fe;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transform: scale(0.5) rotateY(-180deg);
        z-index: 1;
        text-align: center;
        padding: 10px;
        box-sizing: border-box;
      }

      .prize span {
        font-size: 3.5rem;
        margin-bottom: 10px;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
      }

      @keyframes shake3D {
        0% { transform: rotate(0deg) scale(1); }
        15% { transform: rotate(-8deg) scale(1.05); }
        30% { transform: rotate(8deg) scale(1.05); }
        45% { transform: rotate(-6deg) scale(1.05); }
        60% { transform: rotate(6deg) scale(1.05); }
        75% { transform: rotate(-4deg) scale(1.05); }
        90% { transform: rotate(4deg) scale(1.05); }
        100% { transform: rotate(0deg) scale(1); }
      }

      .gift-box.shaking {
        animation: shake3D 0.5s ease-in-out;
      }

      .gift-box.open .box-img {
        transform: translateY(-100px) scale(0) rotateX(90deg);
        opacity: 0;
      }

      .gift-box.open .prize {
        opacity: 1;
        transform: scale(1.3) rotateY(0deg);
        transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 0 20px #00f2fe, 0 0 40px rgba(79, 172, 254, 0.6),
          inset 0 0 15px rgba(255, 255, 255, 0.3);
        z-index: 3;
      }
    </style>
  </head>
  <body>

    <div id="login-container">
      <h2>Mật mã yêu thương 🔒</h2>
      <input type="password" id="password-input" placeholder="Nhập pass đi bé..." autocomplete="off"/>
      <button id="login-btn">Mở Cửa</button>
      <div id="error-msg"></div>
    </div>

    <div id="game-container">
      <h1>Quà sinh nhật part 2</h1>
      <h4>Nên mở 1 rương hui(bên trái qua nhé), mở nhiều sẽ có bất ngờ lémmmm!</h4>
      <div class="gift-container">
        <div class="gift-box" data-id="0">
          <div class="box-img"><span></span></div>
          <div class="prize"></div>
        </div>
        <div class="gift-box" data-id="1">
          <div class="box-img"><span></span></div>
          <div class="prize"></div>
        </div>
        <div class="gift-box" data-id="2">
          <div class="box-img"><span></span></div>
          <div class="prize"></div>
        </div>
        <div class="gift-box" data-id="3">
          <div class="box-img"><span></span></div>
          <div class="prize"></div>
        </div>
      </div>
    </div>

    <script>
      // ================= LOGIC XỬ LÝ MẬT KHẨU =================
      const loginContainer = document.getElementById("login-container");
      const gameContainer = document.getElementById("game-container");
      const passwordInput = document.getElementById("password-input");
      const loginBtn = document.getElementById("login-btn");
      const errorMsg = document.getElementById("error-msg");

      const correctPassword = "240407";

      function checkPassword() {
        if (passwordInput.value === correctPassword) {
          // Nếu đúng pass, ẩn màn hình login và hiện màn hình game
          loginContainer.style.display = "none";
          gameContainer.style.display = "flex";
        } else {
          // Nếu sai pass, hiện báo lỗi và rung khung
          errorMsg.innerText = "Sai mật khẩu rồi bé ơi! Thử lại nha 😋";
          loginContainer.classList.remove("shake-error");
          
          // Trigger reflow để animation có thể chạy lại nếu bấm liên tục
          void loginContainer.offsetWidth; 
          
          loginContainer.classList.add("shake-error");
          passwordInput.value = ""; // Xóa trắng ô nhập
          passwordInput.focus();
        }
      }

      // Bắt sự kiện click nút
      loginBtn.addEventListener("click", checkPassword);

      // Bắt sự kiện nhấn phím Enter trong ô input
      passwordInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
          checkPassword();
        }
      });


      // ================= LOGIC XỬ LÝ MỞ RƯƠNG =================
      const rewards = [
        { icon: "🧴", name: "Bình Nước Mới" },
        { icon: "💵", name: "Lì xì 200k" },
        { icon: "🍔", name: "Dẫn em đi ăn liên tục" },
        { icon: "😋", name: "Làm 1 nháy (real hem đùa nữa)" },
      ];

      const boxes = document.querySelectorAll(".gift-box");

      boxes.forEach((box) => {
        box.addEventListener("click", () => {
          if (
            box.classList.contains("open") ||
            box.classList.contains("shaking")
          )
            return;

          const id = box.getAttribute("data-id");
          const prizeElement = box.querySelector(".prize");

          box.classList.add("shaking");

          setTimeout(() => {
            box.classList.remove("shaking");
            box.classList.add("open");

            prizeElement.innerHTML = `<span>${rewards[id].icon}</span><div style="font-weight: 700;">${rewards[id].name}</div>`;
          }, 500);
        });
      });
    </script>
  </body>
</html>
