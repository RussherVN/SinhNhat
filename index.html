<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mở Rương Bí Ẩn 3D</title>
    <style>
      /* Import font Poppins hiện đại */
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap");

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at center, #1a0b2e 0%, #05010d 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Poppins", sans-serif;
        color: white;
        overflow: hidden;
        user-select: none;
      }

      /* Tiêu đề 3D */
      h1 {
        font-size: 2.5rem;
        font-weight: 900;
        text-align: center;
        line-height: 1.3;
        margin-bottom: 60px;
        color: #fff;
        text-shadow: 0px 4px 0px #b30059, 0px 8px 15px rgba(255, 0, 127, 0.5),
          0px 0px 30px #ff007f;
        letter-spacing: 2px;
      }

      /* Khung chứa có perspective để tạo góc nhìn 3D */
      .gift-container {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
        perspective: 1000px; /* Tạo chiều sâu không gian */
      }

      .gift-box {
        width: 140px;
        height: 140px;
        position: relative;
        cursor: pointer;
        /* Phục vụ cho hiệu ứng lật 3D mượt mà */
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
      }

      /* Hiệu ứng nghiêng 3D khi di chuột */
      .gift-box:hover:not(.open):not(.shaking) {
        transform: translateY(-15px) rotateX(10deg) rotateY(-15deg) scale(1.05);
      }

      /* Giao diện Rương (Tạo khối 3D bằng gradient và shadow) */
      .box-img {
        width: 100%;
        height: 100%;
        background: linear-gradient(145deg, #ffcc00, #ff6600);
        border-radius: 20px;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        /* Đổ bóng nhiều lớp tạo độ dày và khối */
        box-shadow: 10px 15px 25px rgba(0, 0, 0, 0.6),
          inset 5px 5px 15px rgba(255, 255, 255, 0.5),
          inset -5px -10px 20px rgba(0, 0, 0, 0.4);
        border: 2px solid #ffe680;
      }

      /* Dây ruy băng (cũng có viền đổ bóng để nổi lên) */
      .box-img::before,
      .box-img::after {
        content: "";
        position: absolute;
        background: linear-gradient(145deg, #ff1a1a, #cc0000);
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
      }
      .box-img::before {
        width: 26px;
        height: 100%;
        left: 50%;
        transform: translateX(-50%);
      }
      .box-img::after {
        width: 100%;
        height: 26px;
        top: 50%;
        transform: translateY(-50%);
      }

      /* Nắp rương (ảo) để tạo thêm chi tiết */
      .box-img span {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 40px;
        background: gold;
        border-radius: 50%;
        z-index: 3;
        box-shadow: inset 2px 2px 5px rgba(255, 255, 255, 0.8),
          inset -2px -2px 5px rgba(0, 0, 0, 0.5);
        border: 3px solid #b34700;
      }

      /* Thẻ phần thưởng - Phong cách thẻ bài Holographic */
      .prize {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        border-radius: 20px;
        border: 3px solid #00f2fe;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transform: scale(0.5) rotateY(-180deg); /* Ẩn ở mặt sau */
        z-index: 1;
        text-align: center;
        padding: 10px;
        box-sizing: border-box;
      }

      .prize span {
        font-size: 3.5rem; /* Icon to hơn */
        margin-bottom: 10px;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
      }

      /* Animation lắc rương mượt hơn */
      @keyframes shake3D {
        0% {
          transform: rotate(0deg) scale(1);
        }
        15% {
          transform: rotate(-8deg) scale(1.05);
        }
        30% {
          transform: rotate(8deg) scale(1.05);
        }
        45% {
          transform: rotate(-6deg) scale(1.05);
        }
        60% {
          transform: rotate(6deg) scale(1.05);
        }
        75% {
          transform: rotate(-4deg) scale(1.05);
        }
        90% {
          transform: rotate(4deg) scale(1.05);
        }
        100% {
          transform: rotate(0deg) scale(1);
        }
      }

      /* Trạng thái đang lắc */
      .gift-box.shaking {
        animation: shake3D 0.5s ease-in-out;
      }

      /* Trạng thái đã mở */
      .gift-box.open .box-img {
        /* Văng rương lên trên và mờ đi */
        transform: translateY(-100px) scale(0) rotateX(90deg);
        opacity: 0;
      }

      .gift-box.open .prize {
        opacity: 1;
        /* Lật mặt thẻ bài và phóng to lên */
        transform: scale(1.3) rotateY(0deg);
        transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 0 20px #00f2fe, 0 0 40px rgba(79, 172, 254, 0.6),
          inset 0 0 15px rgba(255, 255, 255, 0.3);
        z-index: 3;
      }
    </style>
  </head>
  <body>
    <h1>Quà sinh nhật part 2</h1>
    <h4>Nên mở 1 rương hui(bên trái qua nhé), mở nhiều sẽ có bất ngờ lémmmm!</h4>
    <div class="gift-container">
      <div class="gift-box" data-id="0">
        <div class="box-img"><span></span></div>
        <div class="prize"></div>
      </div>
      <div class="gift-box" data-id="1">
        <div class="box-img"><span></span></div>
        <div class="prize"></div>
      </div>
      <div class="gift-box" data-id="2">
        <div class="box-img"><span></span></div>
        <div class="prize"></div>
      </div>
      <div class="gift-box" data-id="3">
        <div class="box-img"><span></span></div>
        <div class="prize"></div>
      </div>
    </div>

    <script>
      const rewards = [
        { icon: "🧴", name: "Bình Nước Mới" },
        { icon: "💵", name: "Lì xì 200k" },
        { icon: "🍔", name: "Dẫn em đi ăn liên tục" },
        { icon: "😋", name: "Làm 1 nháy(real hem đùa nũa)" },
      ];


      const boxes = document.querySelectorAll(".gift-box");

      boxes.forEach((box) => {
        box.addEventListener("click", () => {
          if (
            box.classList.contains("open") ||
            box.classList.contains("shaking")
          )
            return;

          const id = box.getAttribute("data-id");
          const prizeElement = box.querySelector(".prize");

          box.classList.add("shaking");

          // Thay đổi thời gian timeout khớp với animation lắc (500ms)
          setTimeout(() => {
            box.classList.remove("shaking");
            box.classList.add("open");

            prizeElement.innerHTML = `<span>${rewards[id].icon}</span><div>${rewards[id].name}</div>`;
          }, 500);
        });
      });
    </script>
  </body>
</html>
